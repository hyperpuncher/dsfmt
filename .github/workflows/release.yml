name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross-compiler (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ matrix.target }}
          mkdir -p dist
          BIN="dsfmt"
          EXT=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            EXT=".exe"
          fi
          cp "target/${{ matrix.target }}/release/$BIN$EXT" "dist/dsfmt-${{ matrix.target }}$EXT"
          strip "dist/dsfmt-${{ matrix.target }}$EXT" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: dist/dsfmt-${{ matrix.target }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Rename binaries
        run: |
          mv dist/x86_64-unknown-linux-gnu/dsfmt-x86_64-unknown-linux-gnu dist/dsfmt-linux-x64
          mv dist/aarch64-unknown-linux-gnu/dsfmt-aarch64-unknown-linux-gnu dist/dsfmt-linux-arm64
          mv dist/x86_64-apple-darwin/dsfmt-x86_64-apple-darwin dist/dsfmt-darwin-x64
          mv dist/aarch64-apple-darwin/dsfmt-aarch64-apple-darwin dist/dsfmt-darwin-arm64
          mv dist/x86_64-pc-windows-msvc/dsfmt-x86_64-pc-windows-msvc.exe dist/dsfmt-windows-x64.exe
          rm -rf dist/x86_64-unknown-linux-gnu dist/aarch64-unknown-linux-gnu
          rm -rf dist/x86_64-apple-darwin dist/aarch64-apple-darwin dist/x86_64-pc-windows-msvc

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
